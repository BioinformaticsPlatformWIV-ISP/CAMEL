dependencies: [bakta/1.9.4]
parameters:
  database: {default: true, mandatory: true, option: --db, value: '/db/bakta/latest'}
  output_dir: {default: true, mandatory: true, option: -o, value: 'outdir'}
  proteome: {default: false, mandatory: false, option: --proteins, value: null}
  gram: {default: false, mandatory: false, option: --gram, value: null}
  genus: {default: false, mandatory: false, option: --genus, value: null}
  species: {default: false, mandatory: false, option: --species, value: null}
  strain: {default: false, mandatory: false, option: --strain, value: null}
  plasmid: {default: false, mandatory: false, option: --plasmid, value: null}
  complete_annotation: {default: false, mandatory: false, option: --complete, value: null}
  metagenome: {default: false, mandatory: false, option: --meta, value: null}
  compliance: {default: false, mandatory: false, option: --compliant, value: null}
  locus: {default: false, mandatory: false, option: --locus-tag, value: null}
  threads: {default: true, mandatory: false, option: --threads, value: 2}
tool_command: bakta