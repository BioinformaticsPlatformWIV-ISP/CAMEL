dependencies: [btyper/3.4.0, blast/2.14.0, fastani/1.33]
parameters:
  ani_geneflow: {default: false, mandatory: false, option: --ani_geneflow, value: false}
  ani_species: { default: true, mandatory: false, option: --ani_species, value: true }
  ani_subspecies: { default: true, mandatory: false, option: --ani_subspecies, value: true }
  ani_typestrains: {default: false, mandatory: false, option: --ani_species, value: false}
  bt: {default: true, mandatory: false, option: --bt, value: true}
  bt_coverage: {default: true, mandatory: false, option: --bt_coverage, value: '70'} # only w/ bt = true
  bt_identity: {default: true, mandatory: false, option: --bt_identity, value: '50'} # only w/ bt = true
  bt_overlap: {default: true, mandatory: false, option: --bt_overlap, value: '0.7'} # only w/ bt = true
  download_mlst_latest: {default: false, mandatory: false, option: --download_mlst_latest, value: false} # only when mlst = true
  evalue: {default: true, mandatory: false, option: --evalue, value: '1e-5'} # only w/ virulence/bt = true
  fastani_path: {default: false, mandatory: false, option: --fastani_path, value: ''} # only in combination w/ ani_species/subspecies/geneflow true
  mlst: {default: true, mandatory: false, option: --mlst, value: true}
  output_dir: {default: true, mandatory: true, option: --output, value: 'btyper_output'}
  panc: {default: true, mandatory: false, option: --panC, value: true}
  virulence: {default: true, mandatory: false, option: --virulence, value: true}
  virulence_coverage: {default: true, mandatory: false, option: --virulence_coverage, value: '80'} # only w/ virulence == true
  virulence_db: { default: true, mandatory: false, option: --virulence_db, value: 'aa' }
  virulence_identity: { default: true, mandatory: false, option: --virulence_identity, value: '70' } # only w/ virulence == true
tool_command: btyper3