conda:
  name: fastqc
  packages:
    - fastqc=0.12.1
dependencies:
  - java
  - fastqc/0.12.1
parameters:
  extract:
    default: true
    mandatory: false
    option: '--extract'
    flag: true
  quiet:
    default: true
    mandatory: false
    option: '--quiet'
    flag: true
  threads:
    default: true
    mandatory: true
    option: '--threads'
    value: 2
  no_group:
    default: false
    mandatory: false
    option: '--nogroup'
    flag: true
tool_command: fastqc
