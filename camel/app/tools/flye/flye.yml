dependencies: [flye/2.9.4]
parameters:
  nano_corr: {default: true, mandatory: false, option: --nano-corr, value: ''}
  nano_hq: {default: false, mandatory: false, option: --nano-hq, value: ''}
  nano_raw: {default: false, mandatory: false, option: --nano-raw, value: ''}
  genome_size: {default: false, mandatory: false, option: --genome-size, p_index: 0, value: '4.8g'}
  output_directory: {default: true, mandatory: true, option: --out-dir, p_index: 0, value: assembly_out}
  threads: {default: true, mandatory: false, option: --threads, value: '4'}
  meta: {default: false, mandatory: false, option: --meta, value: None}
  read_error: {default: false, mandatory: false, option: --read-error, value: ''}
  min_overlap: {default: false, mandatory: false, option: --min-overlap, value: ''}
  keep_haplotypes: {default: false, mandatory: false, option: --keep-haplotypes, value: ''}
  no_alt_contigs: {default: false, mandatory: false, option: --no-alt-contigs, value: ''}
  asm_coverage: {default: false, mandatory: false, option: --asm-coverage, value: '50'}
tool_command: flye
