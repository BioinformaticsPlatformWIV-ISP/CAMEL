conda:
  name: gatk
  packages:
    - gatk=3.7
dependencies:
  - java/1.8.0_172
  - gatk/3.7
parameters:
  csv_output:
    default: true
    mandatory: false
    option: -csv
    p_index: 0
    value: recal_QC_data.csv
  pdf_output:
    default: true
    mandatory: true
    option: -plots
    p_index: 0
    value: recal_QC_plots.pdf
tool_command: run_gatk.sh -T AnalyzeCovariates
