dependencies: [java/1.8.0, gatk/3.7]
parameters:
  activeRegionMaxSize: {default: false, mandatory: false, option: --activeRegionMaxSize,
    p_index: 50, value: null}
  activeRegionOut: {default: false, mandatory: false, option: --activeRegionOut, p_index: 99,
    value: HaplotypeCaller_avtiveRegion.igv}
  activityProfileOut: {default: false, mandatory: false, option: --activityProfileOut,
    p_index: 99, value: HaplotypeCaller_avtiveProfile.igv}
  bamOutput: {default: false, mandatory: false, option: --bamOutput, p_index: 99,
    value: HaplotypeCaller_bamOutput.bam}
  bamWriterType: {default: false, mandatory: false, option: --bamWriterType, p_index: 99,
    value: CALLED_HAPLOTYPES}
  emitRefConfidence: {default: false, mandatory: false, option: -ERC, p_index: 10,
    value: NONE}
  graphOutput: {default: false, mandatory: false, option: --graphOutput, p_index: 99,
    value: HaplotypeCaller_graphOutput.txt}
  min_base_quality_score: {default: false, mandatory: false, option: -mbq, p_index: 99,
    value: '10'}
  output: {default: true, mandatory: false, option: -o, p_index: 0, value: raw.snps.indels.vcf}
  ploidy: {default: true, mandatory: false, option: -ploidy, p_index: 10, value: '1'}
  stand_call_conf: {default: true, mandatory: false, option: -stand_call_conf, p_index: 20,
    value: '30'}
  stand_emit_conf: {default: false, mandatory: false, option: -stand_emit_conf, p_index: 30,
    value: '10'}
  variant_index_parameter: {default: false, mandatory: false, option: -variant_index_parameter,
    p_index: 70, value: '64000'}
  variant_index_type: {default: false, mandatory: false, option: -variant_index_type,
    p_index: 60, value: LINEAR}
tool_command: run_gatk.sh -T HaplotypeCaller
