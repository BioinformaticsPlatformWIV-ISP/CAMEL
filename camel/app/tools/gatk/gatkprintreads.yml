conda:
  name: gatk
  packages:
    - gatk=3.7
dependencies:
  - java/1.8.0_172
  - gatk/3.7
parameters:
  bam_external_output:
    default: false
    mandatory: false
    option: null
    p_index: 0
    value: null
  bam_output:
    default: true
    mandatory: false
    option: -o
    p_index: 0
    value: recalibrated.bam
  intervals:
    default: false
    mandatory: false
    option: -L
    p_index: 0
    value: null
  threads:
    default: true
    mandatory: false
    option: -nct
    p_index: 0
    value: "5"
tool_command: run_gatk.sh -T PrintReads
