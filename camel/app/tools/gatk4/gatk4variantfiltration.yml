conda:
  name: gatk
  packages:
    - gatk4=4.1.9.0
dependencies: [java/1.8.0_172, gatk/4.1.9.0]
parameters:
  output: { default: true, mandatory: false, option: --output, p_index: 0, value: filtered_variants.vcf }
  # Add more filters by specifying a list of comma-separated filters. Add the corresponding
  # filter-expressions in the same order in the 'filter-expressions' parameter
  filter-names: {default: false, mandatory: false, option: null, p_index: 0, value: null}
  filter-expressions: {default: false, mandatory: false, option: null, p_index: 0, value: null}
  # Same as with filters above
  genotype-filter-names: { default: false, mandatory: false, option: null, p_index: 0, value: null }
  genotype-filter-expressions: { default: false, mandatory: false, option: null, p_index: 0, value: null }
tool_command: VariantFiltration