conda:
  name: kma
  packages:
    - kma=1.4.14
dependencies:
  - kma/1.4.12a
parameters:
  apm:
    default: false
    mandatory: false
    option: '-apm'
    value: u
  basecalls:
    default: false
    mandatory: false
    option: '-bc'
    value: 0.9
  bc_nano:
    default: false
    mandatory: false
    option: '-bcNano'
    flag: true
  cge:
    default: false
    mandatory: false
    option: '-cge'
    value: null
  output_basename:
    default: true
    mandatory: true
    option: '-o'
    value: kma_output
  ont:
    default: false
    mandatory: false
    option: '-ont'
    flag: true
tool_command: kma