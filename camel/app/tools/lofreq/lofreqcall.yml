conda:
  name: lofreq
  packages:
    - lofreq=2.1.5
dependencies:
  - lofreq_star/2.1.5
parameters:
  bed:
    default: false
    mandatory: false
    option: '--bed'
    value: null
  call_indels:
    default: false
    mandatory: false
    option: '--call-indels'
    flag: true
  only_indels:
    default: false
    mandatory: false
    option: '--only-indels'
    flag: true
  output_filename:
    default: true
    mandatory: true
    option: '--out'
    value: lofreq_variants.vcf
  no_default_filter:
    default: false
    mandatory: false
    option: '--no-default-filter'
    flag: true
  region:
    default: false
    mandatory: false
    option: '--region'
    value: null
tool_command: lofreq call
