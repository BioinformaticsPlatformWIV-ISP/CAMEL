dependencies: [medaka/1.7.3, bcftools/1.15.1, samtools/1.15.1, htslib/1.13, minimap2/2.22]
parameters:
  fill_char: {default: false, mandatory: false, option: --fill_char, value: ''}
  min_depth: {default: false, mandatory: false, option: --min_depth, value: '0'}
  no_fillgaps: {default: false, mandatory: false, option: --no-fillgaps, value: ''}
  output: {default: true, mandatory: true, option: '', p_index: 0, value: consensus.fasta}
  qualities: {default: false, mandatory: false, option: --qualities, value: ''}
  regions: {default: false, mandatory: false, option: --regions, value: ''}
  threads: {default: true, mandatory: false, option: --threads, value: '4'}
tool_command: medaka stitch
