conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  align:
    default: false
    mandatory: false
    option: align
    value: needleman
  exclude:
    default: false
    mandatory: false
    option: -x
    value: null
  flip:
    default: false
    mandatory: false
    option: flip
    value: 'true'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    value: '-1'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    value: '-2'
  ksize:
    default: false
    mandatory: false
    option: ksize
    value: '8'
  match:
    default: false
    mandatory: false
    option: match
    value: '1'
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    value: '-1'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  search:
    default: false
    mandatory: false
    option: search
    value: kmer
  threshold:
    default: false
    mandatory: false
    option: threshold,
    value: '0.50'
tool_command: mothur "#align.seqs({0}{1})"
