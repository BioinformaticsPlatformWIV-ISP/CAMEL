conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  chunks:
    default: false
    mandatory: false
    option: chunks
    value: '4'
  dereplicate:
    default: false
    mandatory: false
    option: dereplicate
    value: 'false'
  dn:
    default: false
    mandatory: false
    option: dn
    value: '1.4'
  idsmoothwindow:
    default: false
    mandatory: false
    option: idsmoothwindow
    value: '32'
  maxlen:
    default: false
    mandatory: false
    option: maxlen
    value: '10000'
  maxp:
    default: false
    mandatory: false
    option: maxp
    value: '2'
  minchunk:
    default: false
    mandatory: false
    option: minchunk
    value: '64'
  mindiv:
    default: false
    mandatory: false
    option: mindiv
    value: '0.5'
  minh:
    default: false
    mandatory: false
    option: minh
    value: '0.3'
  minlen:
    default: false
    mandatory: false
    option: minlen
    value: '10'
  minsmoothid:
    default: false
    mandatory: false
    option: minsmoothid
    value: '0.95'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  skipgaps:
    default: false
    mandatory: false
    option: skipgaps
    value: 'true'
  skipgaps2:
    default: false
    mandatory: false
    option: skipgaps2
    value: 'true'
  xa:
    default: false
    mandatory: false
    option: xa
    value: '1'
  xn:
    default: false
    mandatory: false
    option: xn
    value: '8.0'
tool_command: mothur "#chimera.uchime({0}{1})"
