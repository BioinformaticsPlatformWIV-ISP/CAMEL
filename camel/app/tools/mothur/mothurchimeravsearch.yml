conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  abskew:
    default: false
    mandatory: false
    option: abskew
    value: '1.9'
  dereplicate:
    default: false
    mandatory: false
    option: dereplicate
    value: 'false'
  dn:
    default: false
    mandatory: false
    option: dn
    value: '1.4'
  mindiffs:
    default: false
    mandatory: false
    option: mindiffs
    value: '3'
  mindiv:
    default: false
    mandatory: false
    option: mindiv
    value: '0.5'
  minh:
    default: false
    mandatory: false
    option: minh
    value: '0.3'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  xn:
    default: false
    mandatory: false
    option: xn
    value: '8.0'
tool_command: mothur "#chimera.vsearch({0}{1})"
