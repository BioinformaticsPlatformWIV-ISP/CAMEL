  cutoff: {default: false, mandatory: false, option: cutoff, p_index: 0, value: '51'}
  label: {default: false, mandatory: false, option: label, p_index: 0, value: 0.10-0.30}
  persample: {default: false, mandatory: false, option: persample, p_index: 0, value: 'false'}
  probs: {default: false, mandatory: false, option: probs, p_index: 0, value: 'true'}
  threshold: {default: false, mandatory: false, option: threshold, p_index: 0, value: '90'}
tool_command: mothur "#classify.otu({0}{1})"
