conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  basis:
    default: false
    mandatory: false
    option: basis
    value: otu
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '51'
  label:
    default: false
    mandatory: false
    option: label
    value: 0.10-0.30
  persample:
    default: false
    mandatory: false
    option: persample
    value: 'false'
  probs:
    default: false
    mandatory: false
    option: probs
    value: 'true'
  threshold:
    default: false
    mandatory: false
    option: threshold
    value: '90'
tool_command: mothur "#classify.otu({0}{1})"
