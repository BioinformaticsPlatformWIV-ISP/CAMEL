conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '60'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    value: '-1'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    value: '-2'
  iters:
    default: false
    mandatory: false
    option: iters
    value: '100'
  ksize:
    default: false
    mandatory: false
    option: ksize
    value: '8'
  match:
    default: false
    mandatory: false
    option: match
    value: '1'
  method:
    default: false
    mandatory: false
    option: method
    value: wang
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    value: '-1'
  numwanted:
    default: false
    mandatory: false
    option: numwanted
    value: '1'
  probs:
    default: false
    mandatory: false
    option: probs
    value: 'true'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  relabund:
    default: false
    mandatory: false
    option: relabund
    value: 'false'
  search:
    default: false
    mandatory: false
    option: search
    value: kmer
tool_command: mothur "#classify.seqs({0}{1})"
