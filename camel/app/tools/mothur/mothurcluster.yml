conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '0.05'
  hard:
    default: false
    mandatory: false
    option: hard
    value: 'true'
  method:
    default: true
    mandatory: true
    option: method
    value: opti
  precision:
    default: false
    mandatory: false
    option: precision
    value: '1000'
  sim:
    default: false
    mandatory: false
    option: sim
    value: 'false'
tool_command: mothur "#cluster({0}{1})"
