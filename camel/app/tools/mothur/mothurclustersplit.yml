dependencies: [mothur/1.39.1]
parameters:
  cluster: {default: false, mandatory: false, option: cluster, p_index: 0, value: 'true'}
  cutoff: {default: false, mandatory: false, option: cutoff, p_index: 0, value: '0.025'}
  hard: {default: false, mandatory: false, option: hard, p_index: 0, value: 'false'}
  large: {default: false, mandatory: false, option: large, p_index: 0, value: 'false'}
  method: {default: false, mandatory: false, option: method, p_index: 0, value: average}
  precission: {default: false, mandatory: false, option: precission, p_index: 0, value: '1000'}
  processors: {default: true, mandatory: false, option: processors, p_index: 0, value: '1'}
  splitmethod: {default: false, mandatory: false, option: splitmethod, p_index: 0,
    value: fasta}
  taxlevel: {default: false, mandatory: false, option: taxlevel, p_index: 0, value: '4'}
tool_command: mothur "#cluster.split({0}{1})"
