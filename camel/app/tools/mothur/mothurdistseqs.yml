conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  calc:
    default: false
    mandatory: false
    option: calc
    value: onegap
  countends:
    default: false
    mandatory: false
    option: countends
    value: 'true'
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '0.10'
  output:
    default: false
    mandatory: false
    option: output
    value: lt
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
tool_command: mothur "#dist.seqs({0}{1})"
