conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '0.01-0.03'
  groups:
    default: false
    mandatory: false
    option: groups
    value: Group1-Group2
  large:
    default: false
    mandatory: false
    option: large
    value: 'false'
  sorted:
    default: false
    mandatory: false
    option: sorted
    value: size
  rename:
    default: false
    mandatory: false
    option: rename
    value: 'false'
  method:
    default: false
    mandatory: false
    option: method
    value: 'distance'
tool_command: mothur "#get.oturep({0}{1})"
