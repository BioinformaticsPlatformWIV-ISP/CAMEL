conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  align:
    default: false
    mandatory: false
    option: align
    value: needleman
  bdiffs:
    default: false
    mandatory: false
    option: bdiffs
    value: '0'
  checkorient:
    default: false
    mandatory: false
    option: checkorient
    value: 'false'
  deltaq:
    default: false
    mandatory: false
    option: deltaq
    value: '6'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    value: '-1.0'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    value: '-2.0'
  insert:
    default: false
    mandatory: false
    option: insert
    value: '20'
  match:
    default: false
    mandatory: false
    option: match
    value: '1.0'
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    value: '-1.0'
  pdiffs:
    default: false
    mandatory: false
    option: pdiffs
    value: '0'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  tdiffs:
    default: false
    mandatory: false
    option: tdiffs
    value: '0'
  qfile:
    default: false
    mandatory: false
    option: qfile
    value: 'false'
tool_command: mothur "#make.contigs({0}{1})"
