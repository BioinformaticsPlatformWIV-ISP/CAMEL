conda:
  name: mothur
  packages:
  - mothur=1.39.1
dependencies:
- mothur/1.39.1
parameters:
  align:
    default: false
    mandatory: false
    option: align
    p_index: 0
    value: needleman
  calc:
    default: false
    mandatory: false
    option: calc
    p_index: 0
    value: onegap
  countends:
    default: false
    mandatory: false
    option: countends
    p_index: 0
    value: 'true'
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    p_index: 0
    value: '-'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    p_index: 0
    value: '-1'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    p_index: 0
    value: '-2'
  match:
    default: false
    mandatory: false
    option: match
    p_index: 0
    value: '1'
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    p_index: 0
    value: '-1'
  output:
    default: false
    mandatory: false
    option: output
    p_index: 0
    value: '-'
  processors:
    default: true
    mandatory: false
    option: processors
    p_index: 0
    value: '1'
tool_command: mothur "#pairwise.seqs({0}{1})"
