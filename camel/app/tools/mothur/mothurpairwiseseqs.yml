conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  align:
    default: false
    mandatory: false
    option: align
    value: needleman
  calc:
    default: false
    mandatory: false
    option: calc
    value: onegap
  countends:
    default: false
    mandatory: false
    option: countends
    value: 'true'
  cutoff:
    default: false
    mandatory: false
    option: cutoff
    value: '-'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    value: '-1'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    value: '-2'
  match:
    default: false
    mandatory: false
    option: match
    value: '1'
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    value: '-1'
  output:
    default: false
    mandatory: false
    option: output
    value: '-'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
tool_command: mothur "#pairwise.seqs({0}{1})"
