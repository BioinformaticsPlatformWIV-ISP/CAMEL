conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  end:
    default: false
    mandatory: false
    option: end
    value: '0'
  keepdots:
    default: false
    mandatory: false
    option: keepdots
    value: 'true'
  keepprimer:
    default: false
    mandatory: false
    option: keepprimer
    value: 'false'
  nomatch:
    default: false
    mandatory: false
    option: nomatch
    value: reject
  pdiffs:
    default: false
    mandatory: false
    option: pdiffs
    value: '0'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  rdiffs:
    default: false
    mandatory: false
    option: rdiffs
    value: '0'
  start:
    default: false
    mandatory: false
    option: start
    value: '0'
tool_command: mothur "#pcr.seqs({0}{1})"
