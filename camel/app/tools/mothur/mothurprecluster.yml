conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  align:
    default: false
    mandatory: false
    option: align
    value: needleman
  diffs:
    default: false
    mandatory: false
    option: diffs
    value: '1'
  gapextend:
    default: false
    mandatory: false
    option: gapextend
    value: '-1'
  gapopen:
    default: false
    mandatory: false
    option: gapopen
    value: '-2'
  match:
    default: false
    mandatory: false
    option: match
    value: '1'
  mismatch:
    default: false
    mandatory: false
    option: mismatch
    value: '-1'
  processors:
    default: true
    mandatory: false
    option: processors
    value: '1'
  skip_step:
    default: false
    mandatory: false
    option: null
    value: 'False'
  topdown:
    default: false
    mandatory: false
    option: topdown
    value: 'true'
  method:
    default: false
    mandatory: false
    option: method
    value: 'simple'
tool_command: mothur "#pre.cluster({0}{1})"
