conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  freq:
    default: false
    mandatory: false
    option: freq
    value: '100'
  iters:
    default: false
    mandatory: false
    option: iters
    value: '1000'
  label:
    default: false
    mandatory: false
    option: label
    value: '0.03'
  processors:
    default: false
    mandatory: false
    option: processors
    value: '1'
tool_command: mothur "#rarefaction.single({0}{1})"
