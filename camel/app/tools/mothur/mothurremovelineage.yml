conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  dups:
    default: false
    mandatory: false
    option: dups
    value: 'true'
  taxon:
    default: false
    mandatory: false
    option: taxon
    value: taxon1-taxon2
tool_command: mothur "#remove.lineage({0}{1})"
