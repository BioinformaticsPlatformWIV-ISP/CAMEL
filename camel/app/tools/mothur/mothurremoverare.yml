conda:
  name: mothur
  packages:
    - mothur=1.48.0
dependencies:
  - mothur/1.48.0
parameters:
  groups:
    default: false
    mandatory: false
    option: groups
    value: all
  label:
    default: false
    mandatory: false
    option: label
    value: all
  nseqs:
    default: false
    mandatory: false
    option: nseqs
    value: '1'
tool_command: mothur "#remove.rare({0}{1})"
