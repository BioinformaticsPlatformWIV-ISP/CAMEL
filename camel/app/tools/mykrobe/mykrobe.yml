conda:
  name: mykrobe
  packages:
    - mykrobe=0.13.0
    - setuptools<81
dependencies:
  - mykrobe/0.13.0
parameters:
  threads:
    default: true
    mandatory: false
    option: '-t'
    value: '1'
  output_filename:
    default: true
    mandatory: true
    option: '--out'
    value: mykrobe.csv
tool_command: mykrobe
