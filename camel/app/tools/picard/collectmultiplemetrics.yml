dependencies: [java/1.8.0, picard/2.8.3]
parameters:
  metrics_CollectAlignmentSummaryMetrics: {default: true, mandatory: false, option: PROGRAM,
    p_index: 20, value: CollectAlignmentSummaryMetrics}
  metrics_CollectGcBiasMetrics: {default: true, mandatory: false, option: PROGRAM,
    p_index: 50, value: CollectGcBiasMetrics}
  metrics_CollectInsertSizeMetrics: {default: true, mandatory: false, option: PROGRAM,
    p_index: 30, value: CollectInsertSizeMetrics}
  metrics_QualityScoreDistribution: {default: true, mandatory: false, option: PROGRAM,
    p_index: 40, value: QualityScoreDistribution}
  output_prefix: {default: true, mandatory: true, option: O, p_index: 0, value: readmap_qc}
  reset matrics: {default: true, mandatory: false, option: PROGRAM, p_index: 10, value: 'null'}
tool_command: run_picard.sh CollectMultipleMetrics
