dependencies: [java/1.8.0_172, picard/2.23.3]
parameters:
  output: {default: true, mandatory: false, option: O, p_index: 0, value: fastq.unmapped.bam}
  sample_name: {default: true, mandatory: false, option: SM, p_index: 10, value: sample}
  readgroup_name: {default: false, mandatory: false, option: RG, p_index: 10, value: sample.rg}
  library_name: {default: false, mandatory: false, option: LB, p_index: 10, value: unknown}
  platform: {default: false, mandatory: false, option: PL, p_index: 10, value: illumina}
  platform_unit: {default: false, mandatory: false, option: PU, p_index: 10, value: run_barcode.lane}
  sort_order: {default: false, mandatory: false, option: SO, p_index: 10, value: queryname}
  sequencing_center: {default: false, mandatory: false, option: CN, p_index: 10, value: unknown}
  quality_format: {default: false, mandatory: false, option: V, p_index: 10, value: Standard}
  tmp_dir: {default: false, mandatory: false, option: TMP, p_index: 10, value: "/temp/picard"}
tool_command: FastqToSam
