dependencies: [java/1.8.0_172, picard/2.23.3]
parameters:
  output: {default: true, mandatory: false, option: O, p_index: 0, value: sorted.bam}
  sort_order: {default: true, mandatory: false, option: SORT_ORDER, p_index: 10, value: queryname}
  create_index: {default: false, mandatory: false, option: CREATE_INDEX, p_index: 10, value: true}
  create_md5_file: {default: false, mandatory: false, option: CREATE_MD5_FILE, p_index: 10, value: true}
  max_records_in_ram: {default: false, mandatory: false, option: MAX_RECORDS_IN_RAM, p_index: 10, value: '300000'}
tool_command: run_picard.sh SortSam
