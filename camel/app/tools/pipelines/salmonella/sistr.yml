conda:
  name: sistr
  packages:
    - sistr_cmd=1.1.3
    - setuptools<81
dependencies:
  - blast/2.14.0
  - mafft/7.490
  - sistr/1.1.3
parameters:
  threads:
    default: true
    mandatory: false
    option: '--threads'
    value: '1'
  output_filename:
    default: true
    mandatory: true
    option: '-o'
    value: sistr_output.json
  tmp_dir:
    default: false
    mandatory: false
    option: '--tmp-dir'
    value: /tmp
tool_command: sistr