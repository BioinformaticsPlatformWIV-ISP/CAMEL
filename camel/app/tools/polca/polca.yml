dependencies:
  - pypolca/0.4.0
  - bwa/0.7.17
  - samtools/1.21
  - freebayes/1.36
parameters:
  threads:
    default: true
    mandatory: false
    option: '-t'
    value: '4'
  only_create_vcf:
    default: false
    mandatory: false
    option: '-n'
    flag: true
  memory_per_thread:
    default: false
    mandatory: false
    option: '-m'
    value: null
tool_command: pypolca run
