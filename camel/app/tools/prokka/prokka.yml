dependencies: [prokka/1.11, blast/2.14.0]
parameters:
  add_genes: {default: false, mandatory: false, option: --add_genes, p_index: 0, value: null}
  centre: {default: false, mandatory: false, option: --centre, p_index: 0, value: ''''''}
  cpus: {default: true, mandatory: false, option: --cpus, p_index: 0, value: '8'}
  disable_rrna: {default: false, mandatory: false, option: --norrna, p_index: 0, value: null}
  disable_trna: {default: false, mandatory: false, option: --notrna, p_index: 0, value: null}
  evalue_cutoff: {default: false, mandatory: false, option: --evalue, p_index: 0,
    value: 1e-06}
  fast: {default: true, mandatory: false, option: --fast, p_index: 0, value: null}
  force: {default: true, mandatory: false, option: --force, p_index: 0, value: null}
  force_genbank_compliance: {default: false, mandatory: false, option: --compliant,
    p_index: 0, value: null}
  genetic_code: {default: false, mandatory: false, option: --gcode, p_index: 0, value: '0'}
  genus: {default: false, mandatory: false, option: --genus, p_index: 0, value: '''Genus'''}
  gff_version: {default: false, mandatory: false, option: --gffver, p_index: 0, value: '3'}
  gram: {default: false, mandatory: false, option: --gram, p_index: 0, value: ''''''}
  increment: {default: false, mandatory: false, option: --increment, p_index: 0, value: '1'}
  kingdom: {default: false, mandatory: false, option: --kingdom, p_index: 0, value: '''Bacteria'''}
  locus_tag_prefix: {default: false, mandatory: false, option: --locustag, p_index: 0,
    value: '''PROKKA'''}
  metagenome: {default: false, mandatory: false, option: --metagenome, p_index: 0,
    value: --metagenome}
  min_contig_length: {default: false, mandatory: false, option: --mincontiglen, p_index: 0,
    value: '1'}
  plasmid: {default: false, mandatory: false, option: --plasmid, p_index: 0, value: ''''''}
  species: {default: false, mandatory: false, option: --species, p_index: 0, value: '''species'''}
  strain: {default: false, mandatory: false, option: --strain, p_index: 0, value: '''strain'''}
tool_command: prokka
