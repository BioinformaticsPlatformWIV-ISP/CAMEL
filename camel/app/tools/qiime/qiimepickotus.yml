    p_index: 0
    value: "False"
  suppress_de_novo_chimera_detection:
    default: false
    mandatory: false
    option: --suppress_de_novo_chimera_detection
    p_index: 0
    value: "False"
  suppress_new_clusters:
    default: false
    mandatory: false
    option: --suppress_new_clusters
    p_index: 0
    value: "False"
  suppress_prefilter_exact_match:
    default: false
    mandatory: false
    option: --suppress_prefilter_exact_match
    p_index: 0
    value: "False"
  suppress_presort_by_abundance_uclust:
    default: false
    mandatory: false
    option: --suppress_presort_by_abundance_uclust
    p_index: 0
    value: "False"
  suppress_reference_chimera_detection:
    default: false
    mandatory: false
    option: --suppress_reference_chimera_detection
    p_index: 0
    value: "False"
  suppress_uclust_stable_sort:
    default: false
    mandatory: false
    option: --suppress_uclust_stable_sort
    p_index: 0
    value: "False"
  swarm_resolution:
    default: false
    mandatory: false
    option: --swarm_resolution
    p_index: 0
    value: "1"
  threads:
    default: false
    mandatory: false
    option: --threads
    p_index: 0
    value: "1"
  trie_prefilter:
    default: false
    mandatory: false
    option: --trie_prefilter
    p_index: 0
    value: "False"
  trie_reverse_seqs:
    default: false
    mandatory: false
    option: --trie_reverse_seqs
    p_index: 0
    value: "False"
  usearch61_sort_method:
    default: false
    mandatory: false
    option: --usearch61_sort_method
    p_index: 0
    value: abundance
  usearch_fast_cluster:
    default: false
    mandatory: false
    option: --usearch_fast_cluster
    p_index: 0
    value: "False"
  user_sort:
    default: false
    mandatory: false
    option: --user_sort
    p_index: 0
    value: "False"
  word_length:
    default: false
    mandatory: false
    option: --word_length
    p_index: 0
    value: "8"
tool_command: pick_otus.py
