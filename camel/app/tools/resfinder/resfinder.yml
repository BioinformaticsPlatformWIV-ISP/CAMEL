dependencies: [resfinder/4.1.11, blast/2.7.1, kma/1.3.5]
parameters:
  acquired: {default: true, mandatory: true, option: --acquired, value: ''}
  blast_path: {default: false, mandatory: false, option: --blastPath, value: ''}
  databases: {default: false, mandatory: false, option: --databases, value: ''}
  dbpoint_path: {default: false, mandatory: false, option: --db_path_point, value: ''}
  dbres_path: {default: false, mandatory: false, option: --db_path_res, value: ''}
  dbres_kma_path: {default: false, mandatory: false, option: --db_path_res_kma, value: ''}
  kma_path: {default: false, mandatory: false, option: --kmaPath, value: ''}
  min_cov: {default: false, mandatory: false, option: --min_cov, value: ''}
  min_cov_point: {default: false, mandatory: false, option: --min_cov_point, value: ''}
  output_path: {default: true, mandatory: true, option: --outputPath, value: 'output_folder'}
  point: {default: false, mandatory: false, option: --point, value: ''}
  species: {default: false, mandatory: false, option: --species, value: ''}
  specific_genes: {default: false, mandatory: false, option: -g, value: ''}
  threshold: {default: false, mandatory: false, option: --threshold, value: ''}
  threshold_point: {default: false, mandatory: false, option: --threshold_point, value: ''}
  unknown_mut: {default: false, mandatory: false, option: --unknown_mut, value: false}
tool_command: run_resfinder.py
