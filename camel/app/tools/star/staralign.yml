  quant_mode: {default: false, mandatory: false, option: --quantMode, value: 'TranscriptomeSAM'}
  command_input: {default: true, mandatory: false, option: readFilesCommand, value: 'zcat'}
  genome_load: {default: false, mandatory: false, option: --genomeLoad, value: 'LoadAndKeep'}
  ends_align: {default: false, mandatory: false, option: --alignEndsType, value: 'Local'}
  del_penalty: {default: false, mandatory: false, option: --scoreDelOpen, value: '-2'}
  ins_penalty: {default: false, mandatory: false, option: --scoreInsOpen, value: '-2'}
  n_max_multi_map: {default: false, mandatory: false, option: --outFilterMultimapNmax, value: '10'}
  n_max_mismatch: {default: false, mandatory: false, option: --outFilterMismatchNmax, value: '10'}
  filename_output: {default: true, mandatory: true, option: null, value: 'reads.sorted.sam'}
  std_out: {default: true, mandatory: true, option: --outStd, value: 'SAM'}
  type_output: {default: true, mandatory: true, option: --outSAMtype, value: 'SAM'}
tool_command: STAR