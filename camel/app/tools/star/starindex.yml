conda:
  name: star
  packages:
    - star=2.7.11b
dependencies:
  - star/2.7.11b
parameters:
  overhang:
    default: false
    mandatory: false
    option: '--sjdbOverhang'
    value: '100'
  SA_index:
    default: false
    mandatory: false
    option: '--genomeSAindexNbases'
    value: '14'
  symlink_input:
    default: true
    mandatory: false
    option: null
    value: null
  threads:
    default: true
    mandatory: true
    option: '--runThreadN'
    value: '8'
tool_command: STAR