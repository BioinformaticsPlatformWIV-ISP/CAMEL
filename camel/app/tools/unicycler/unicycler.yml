dependencies:
  - unicycler/0.5.0
  - SPAdes/3.15.5
  - racon/1.3.1
  - blast/2.14.0
parameters:
  keep:
    default: false
    mandatory: false
    option: '--keep'
    value: '1'
  linear_seqs:
    default: false
    mandatory: false
    option: '--linear_seqs'
    value: '0'
  min_fasta_length:
    default: false
    mandatory: false
    option: '--min_fasta_length'
    value: '100'
  mode:
    default: false
    mandatory: false
    option: '--mode'
    value: normal
  output_dir:
    default: true
    mandatory: false
    option: '--out'
    value: assembly
  threads:
    default: true
    mandatory: false
    option: '--threads'
    value: '8'
tool_command: unicycler
