dependencies: [velvet/1.2.10]
parameters:
  clean: {default: true, mandatory: false, option: -clean, p_index: 30, value: 'yes'}
  cov_cutoff: {default: true, mandatory: false, option: -cov_cutoff, p_index: 20,
    value: auto}
  exp_cov: {default: true, mandatory: true, option: -exp_cov, p_index: 10, value: auto}
  ins_length: {default: false, mandatory: false, option: -ins_length, p_index: 0,
    value: ''}
  scaffolding: {default: false, mandatory: false, option: -scaffolding, p_index: 0,
    value: 'yes'}
  shortMatePaired: {default: false, mandatory: false, option: -shortMatePaired, p_index: 0,
    value: 'false'}
tool_command: velvetg
