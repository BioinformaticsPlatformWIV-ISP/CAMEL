name: Quality Checks
steps:
- id: FASTQC_additional_checks
  tool: !!python/name:app.tools.fastqc.fastqcadditionalchecks.FastQCAdditionalChecks
  inputs:
  - name: TXT
    from: initial

- id: Assembly_indexing
  tool: !!python/name:app.tools.bowtie2.bowtie2index.Bowtie2Index
  inputs:
  - name: FASTA_REF
    from: initial

- id: Read_mapping
  tool: !!python/name:app.tools.bowtie2.bowtie2map.Bowtie2Map
  inputs:
  - name: FASTQ_PE
    from: initial
  - name: FASTQ_SE_FORWARD
    from: initial
    alias: FASTQ_SE
  - name: FASTQ_SE_REVERSE
    from: initial
    alias: FASTQ_SE
  - name: INDEX_GENOME_PREFIX
    from: Assembly_indexing

- id: Sam_to_bam_conversion
  tool: !!python/name:app.tools.samtools.samtoolsview.SamtoolsView
  inputs:
  - name: SAM
    from: Read_mapping

- id: Alignment_sorting
  tool: !!python/name:app.tools.samtools.samtoolssort.SamtoolsSort
  inputs:
  - name: BAM
    from: Sam_to_bam_conversion

- id: Coverage_calculation
  tool: !!python/name:app.tools.samtools.samtoolsdepth.SamtoolsDepth
  inputs:
  - name: BAM
    from: Alignment_sorting

- id: Check_quality_criteria
  tool: !!python/name:app.tools.pipelines.quality_checks.qualitycriteriachecker.QualityCriteriaChecker
  inputs:
  - name: VAL_cgMLST_Stats
    from: initial
  informs:
  - from: Coverage_calculation
    alias: coverage
  - from: Read_mapping
    alias: mapping
  - from: FASTQC_additional_checks
    alias: fastqc_checks

- id: Report_generation
  tool: !!python/name:app.tools.pipelines.quality_checks.htmlreporterqualitychecks.HtmlReporterQualityChecks
  inputs:
  - name: HTML
    from: initial
  - name: DIR_HTML
    from: initial
  - name: VAL_cgMLST_Stats
    from: initial
  informs:
  - from: Coverage_calculation
    alias: coverage
  - from: Read_mapping
    alias: mapping
  - from: FASTQC_additional_checks
    alias: additional_checks
  - from: Check_quality_criteria
    alias: quality_criteria
