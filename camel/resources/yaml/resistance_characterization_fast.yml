name: Resistance Characterization
steps:

- id: Gene_database_manager
  tool: !!python/name:app.tools.pipelines.resistance_characterization.genedbmanager.GeneDBManager
  inputs:
  - name: DIR
    from: initial

- id: Blastn
  tool: !!python/name:app.tools.blast.blastn.Blastn
  inputs:
  - name: FASTA
    from: initial

  - name: FASTA
    from: Gene_database_manager
    alias: DB_BLAST

- id: TSV_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
  - name: ASN
    from: Blastn

- id: Hit_filtering
  tool: !!python/name:app.tools.pipelines.resistance_characterization.hitfiltering.HitFiltering
  inputs:
  - name: TSV
    from: TSV_generation

- id: Text_alignment_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
  - name: ASN
    from: Blastn

- id: Text_alignment_extraction
  tool: !!python/name:app.tools.pipelines.resistance_characterization.alignmentextractor.AlignmentExtractor
  inputs:
  - name: TXT
    from: Text_alignment_generation

  - name: VAL_Hits
    from: Hit_filtering

- id: Report_generation
  tool: !!python/name:app.tools.pipelines.resistance_characterization.htmlreporterreschar.HtmlReporterResChar
  inputs:
  - name: HTML
    from: initial

  - name: DIR_HTML
    from: initial

  - name: DIR
    from: initial
    alias: DIR_DB
  - name: VAL_Hits
    from: Hit_filtering

  - name: TXT
    from: Text_alignment_extraction

  informs:
  - from: Gene_database_manager
    alias: database_info
