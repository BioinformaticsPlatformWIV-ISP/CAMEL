name: Trimming - Assembly
steps:
- id: Read_trimming
  tool: !!python/name:app.tools.trimmomatic.trimmomatic.Trimmomatic
  inputs:
  - name: FASTQ_PE
    from: initial

- id: FastQC
  tool: !!python/name:app.tools.fastqc.fastqc.FastQC
  inputs:
  - name: FASTQ_PE
    from: Read_trimming
    alias: FASTQ

- id: Assembly
  tool: !!python/name:app.tools.spades.spades.SPAdes
  inputs:
  - name: FASTQ_PE
    from: Read_trimming
  - name: FASTQ_SE_FORWARD
    from: Read_trimming
  - name: FASTQ_SE_REVERSE
    from: Read_trimming