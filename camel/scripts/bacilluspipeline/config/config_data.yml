####################
# Pipeline options #
####################
citations:
  main: Bogaerts_2021-stec_pipeline
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Langmead_2012-bowtie2
    - Camacho_2009-blast

#########################
# Tool specific options #
#########################

downsampling:
  coverage_max: {coverage_max}
  expected_genome_size: {genome_size}

contamination_check:
  db: /db/kraken2/latest/abfhpv/
  expected_species: {expected_species}

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: {expected_gc_content}

assembly:
  spades:
    cov_cutoff: 10
  min_contig_length: 1000

sequence_typing:
  mlst:
    path: {mlst_db}
  cgmlst:
    path: {cgmlst_db}
    detection_method: blast

amrfinder:
  db: /db/amrfinder/latest

mob_suite:
  db: /db/mob_suite/latest

gene_detection:
  gmo:
    path: /scratch/magodfroid/BacillusPipeline/PipelineData
  vfdb_core:
      path: /db/gene_detection/VFDB_core
      perc_identity_cutoff: 90
      metadata:
        name: Gene
        key: gene
  plasmidfinder:
    path: /db/gene_detection/PlasmidFinder-entero
    params:
      blastn:
        min_percent_identity: 95
        min_coverage: 60
      srst2:
        max_divergence: 5
        min_coverage: 60
    metadata:
      name: Notes
      key: notes