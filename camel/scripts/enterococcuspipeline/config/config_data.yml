#####################
# Pipeline settings #
#####################
citations:
  main: null
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Langmead_2012-bowtie2
    - Li_2009-samtools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Inouye_2014-srst2
    - Zankari_2012-resfinder
    - Feldgarden_2019-ndaro
    - Zankari_2017-pointfinder
    - Joensen_2014-virulencefinder
    - Chen_2016-vfdb
    - Carattoli_2020-plasmidfinder
    - Antipov_2016-plasmidspades
    - Jolley_2010-bigsdb


#########################
# Tool specific options #
#########################
read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2/latest/abfhpv/
  expected_species: {expected_species}

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: {gc_content}

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 10
  min_contig_length: 1000

pointfinder:
  db: {pointfinder_db}

############################
# Gene detection databases #
############################
gene_detection:
  resfinder:
    path: /db/gene_detection/ResFinder
    perc_identity_cutoff: 90
    metadata:
      name: Antibiotic(s)
      key: antibiotics

  ncbi_amr:
    path: /db/gene_detection/NCBI_AMR/
    perc_identity_cutoff: 90

  vfdb_core:
    path: /db/gene_detection/VFDB_core
    perc_identity_cutoff: 90
    metadata:
      name: Gene
      key: gene

  virulencefinder:
    path: /db/gene_detection/VirulenceFinder-Enterococcus
    metadata:
      name: Protein function
      key: protein_function

  plasmidfinder:
    path: /db/gene_detection/PlasmidFinder-entero
    params:
      blastn:
        min_percent_identity: 95
        min_coverage: 60
      srst2:
        max_divergence: 5
        min_coverage: 60
    metadata:
      name: Notes
      key: notes

###################
# Sequence typing #
###################
sequence_typing:
  mlst:
    path: {mlst_db}
  cgmlst:
    path: {cgmlst_db}
    detection_method: blast
