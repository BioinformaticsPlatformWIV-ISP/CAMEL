#############
# Databases #
#############
dbs:
  51snp:
    location: &db_51snp {DB_ROOT}/pipelines/mycobacterium/51snp
    required: false
    method: ftp
  amr:
    location: &db_amr {DB_ROOT}/pipelines/mycobacterium/amr/who_2023.6
    required: false
    method: ftp
  busco:
    location: &db_busco {DB_ROOT}/busco/odb10
    required: true
    method: ftp
  confindr:
    location: &db_confindr {DB_ROOT}/confindr/0.8.1
    required: false
    method: skip
  gene_detection_amr_cds:
    location: &db_gd_amr_cds {DB_ROOT}/pipelines/mycobacterium/amr/gene_detection/myco_amr_cds
    required: false
    method: ftp
  gene_detection_csb_rd:
    location: &db_gd_csb_rd {DB_ROOT}/pipelines/mycobacterium/csb_rd
    required: false
    method: ftp
  gene_detection_ncbi_16s:
    location: &db_gd_ncbi_16s {DB_ROOT}/gene_detection/NCBI_16S
    required: false
    method: ftp
  gene_detection_hsp65:
    location: &db_gd_hsp65 {DB_ROOT}/pipelines/mycobacterium/hsp65
    required: false
    method: ftp
  kraken2:
    location: &db_kraken2 {DB_ROOT}/kraken2_microbial/latest
    required: false
    method: ftp
  ncbi_human_read_scrubber:
    location: &db_ncbi_human_read_scrubber {DB_ROOT}/ncbi_human_read_scrubber/human_filter.db
    is_file: true
    required: false
    method: ftp
  ref_fasta:
    location: &ref_fasta {DB_ROOT}/refgenomes/Mycobacterium_tuberculosis/H37Rv.fasta
    is_file: true
    required: true
    method: ftp
  ref_gff3:
    location: &ref_gff3 {DB_ROOT}/refgenomes/Mycobacterium_tuberculosis/H37Rv.gff
    is_file: true
    required: true
    method: ftp
  ref_tabix:
    location: &ref_tabix {DB_ROOT}/refgenomes/Mycobacterium_tuberculosis/H37Rv.tab.ann.gz
    is_file: true
    required: true
    method: ftp
  typing_cgmlst:
    location: &db_typing_cgmlst {DB_ROOT}/sequence_typing/mycobacterium/cgmlst
    required: false
    method: mist
  typing_mlst:
    location: &db_typing_mlst {DB_ROOT}/sequence_typing/mycobacterium/mlst
    required: false
    method: mist
  typing_rmlst:
    location: &db_typing_rmlst {DB_ROOT}/sequence_typing/various/rmlst
    required: false
    method: skip
  snp_lineage:
    location: &snp_lineage_bed {DB_ROOT}/pipelines/mycobacterium/snp_lineage/tbdb-2024_02_23.bed
    is_file: true
    required: false
    method: ftp
  variant_calling_bed:
    location: &variant_calling_bed {DB_ROOT}/pipelines/mycobacterium/variant_filtering/excluded_regions.bed
    is_file: true
    required: true
    method: ftp

####################
# Pipeline options #
####################
citations:
  main: Bogaerts_2021-mycobacterium_validation
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Low_2019-confindr
    - Manni_2021-busco
    - Langmead_2012-bowtie2
    - Li_2009-samtools
    - Li_2011-bcftools
    - Kaas_2014-csi_phylogeny
    - Ezewudo_2018-reseqtb_uvp
    - Bogaerts_2025-mist
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Xia_2016-spotyping
    - Lipworth_2019-snpit
    - Coll_2014-myco_snp_lineage
    - Dai_2011-myco_hsp65
    - Srilohasin_2014-myco_51snp
    - Danecek_2017-bcftools_csq
    - Miotto_2017-myco_amr
    - Jolley_2010-bigsdb

####################
# Reference genome #
####################
reference:
  expected_gc: 51.5
  fasta: *ref_fasta
  gff3: *ref_gff3
  name: H37Rv
  tabix: *ref_tabix
  url: https://www.ncbi.nlm.nih.gov/datasets/genome/GCF_000195955.2

################
# Tool options #
################
51snp:
  db: *db_51snp

amr:
  db: *db_amr

assembly:
  spades:
    cov_cutoff: 10
  min_contig_length: 1000

busco:
  db: *db_busco

confindr:
  db: *db_confindr

contamination_check:
  db: *db_kraken2
  expected_species: Mycobacterium tuberculosis

downsampling:
  coverage_max: {COV_MAX}
  expected_genome_size: 4_411_532

quality_checks:
  typing_scheme: {QC_SCHEME}
  expected_gc_content: 65.6
  coverage_mode: ref

read_trimming: {{}}
read_scrubbing:
  db: *db_ncbi_human_read_scrubber

sequence_typing:
  dbs:
    mlst:
      path: *db_typing_mlst
    cgmlst:
      path: *db_typing_cgmlst
      detection_method: blast
    rmlst:
      path: *db_typing_rmlst
      message:
        content: rMLST is only available for noncommercial use, see <a href="https://pubmlst.org/species-id">PubMLST</a> for more info.
        category: info

snp_lineage:
  bed: *snp_lineage_bed

variant_calling:
  ploidy: 1
  report_include_bam: {EXPORT_BAM}

variant_filtering:
  region:
    bed_file: *variant_calling_bed
  depth:
    min_fwd_depth: 1
    min_rev_depth: 1
  distance:
    min_distance: 0

gene_detection:
  dbs:
    amr_cds:
      path: *db_gd_amr_cds
      force_method: kma
      params:
        min_coverage: 20
      metadata:
        name: Antibiotics
        key: antibiotics

    csb_rd:
      path: *db_gd_csb_rd
      force_method: kma

    ncbi_16s:
      path: *db_gd_ncbi_16s
      params:
        blastn:
          min_percent_identity: 95
          min_coverage: 90
      filtering_method: score
      force_method: blast
      metadata:
        name: Species
        key: species

    hsp65:
      path: *db_gd_hsp65
      metadata:
        name: Species
        key: species_name

pointfinder:
  db: mycobacterium_tuberculosis
