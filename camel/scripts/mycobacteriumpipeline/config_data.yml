      - 51snp
  amr:
    dbs:
      - amr
      - gene_detection_amr_cds
  csb_rd:
    dbs:
      - gene_detection_csb_rd
  cgmlst:
    dbs:
      - typing_cgmlst
  confindr:
    dbs:
      - confindr
  hsp65:
    dbs:
      - gene_detection_hsp65
  human_read_scrubbing:
    dbs:
      - ncbi_human_read_scrubber
  mlst:
    dbs:
      - typing_mlst
  ncbi_16s:
    dbs:
      - gene_detection_ncbi_16s
  rmlst:
    dbs:
      - typing_rmlst
  snp_lineage:
    dbs:
