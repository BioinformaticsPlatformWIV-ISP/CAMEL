####################
# Pipeline options #
####################
citations:
  main: Bogaerts_2019-neisseria_validation
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Langmead_2012-bowtie2
    - Li_2009-samtools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Inouye_2014-srst2
    - Gupta_2014-argannot
    - McArthur_2013-card
    - Zankari_2012-resfinder
    - Feldgarden_2019-ndaro
    - Jolley_2010-bigsdb
    - Bratcher_2014-neisseria_cgmlst

#########################
# Tool specific options #
#########################
read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2/latest/abfhpv/
  expected_species: Neisseria meningitidis

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: 51.5

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 'off'
  min_contig_length: 0

############################
# Gene detection databases #
############################
gene_detection:
  argannot:
    path: /db/gene_detection/ARG-ANNOT

  resfinder:
    path: /db/gene_detection/ResFinder
    metadata:
      name: Antibiotic(s)
      key: antibiotics

  card:
    path: /db/gene_detection/CARD

  ncbi_amr:
    path: /db/gene_detection/NCBI_AMR/
    metadata:
      name: Antibiotic(s)
      key: antibiotic

###################
# Sequence typing #
###################
