#########################
# Tool specific options #
#########################
read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2/latest/abfhpv/
  expected_species: Neisseria meningitidis

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: 51.5

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 'off'
  min_contig_length: 0

############################
# Gene detection databases #
############################
gene_detection:
  argannot:
    path: /db/gene_detection/ARG-ANNOT

  resfinder:
    path: /db/gene_detection/ResFinder
    metadata:
      name: Antibiotic(s)
      key: antibiotics

  card:
    path: /db/gene_detection/CARD

  ncbi_amr:
    path: /db/gene_detection/NCBI_AMR/

###################
# Sequence typing #
###################
sequence_typing:
  pora:
    path: /db/sequence_typing/neisseria/pora
  porb:
    path: /db/sequence_typing/neisseria/porb
  bast:
    path: /db/sequence_typing/neisseria/bast
  feta:
