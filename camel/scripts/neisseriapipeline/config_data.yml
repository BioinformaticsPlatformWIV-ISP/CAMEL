    serogroup_w:
      path: /db/sequence_typing/neisseria/capsule_region_a_serogroup_w
    serogroup_x:
      path: /db/sequence_typing/neisseria/capsule_region_a_serogroup_x
    serogroup_y:
      path: /db/sequence_typing/neisseria/capsule_region_a_serogroup_y
    serogroup_z:
      path: /db/sequence_typing/neisseria/capsule_region_a_serogroup_z
    vaccine_targets:
