analyses:
  abritamr:
    dbs:
      - abritamr
  amrfinder:
    dbs:
      - amrfinder
  cgmlst:
    dbs:
      - typing_cgmlst
  confindr:
    dbs:
      - confindr
  human_read_scrubbing:
    dbs:
      - ncbi_human_read_scrubber
  kraken2:
    dbs:
      - kraken2
  mlst:
    dbs:
      - typing_mlst
  mob_suite:
    dbs:
      - mob_suite
  mykrobe:
    dbs:
      - mykrobe
  resfinder4:
    dbs:
      - resfinder4
  rmlst:
    dbs:
      - typing_rmlst
  serotype:
    dbs:
      - sistr
      - seqsero
  spifinder:
    dbs:
      - spifinder
  variant_calling:
    dbs: []
  vfdb_core:
    dbs:
      - gene_detection_vfdb_core

#############
# Databases #
#############
dbs:
  abritamr:
    location: &db_abritamr {DB_ROOT}/amrfinder/v4/latest
    required: false
    method: ftp
  amrfinder:
    location: &db_amrfinder {DB_ROOT}/amrfinder/v4/latest
    required: false
    method: ftp
  busco:
    location: &db_busco {DB_ROOT}/busco/odb10
    required: true
    method: ftp
  confindr:
    location: &db_confindr {DB_ROOT}/confindr/0.8.1
    required: false
    method: skip
  gene_detection_vfdb_core:
    location: &db_gd_vfdb_core {DB_ROOT}/gene_detection/VFDB_core
    required: false
    method: ftp
  kraken2:
    location: &db_kraken2 {DB_ROOT}/kraken2_microbial/latest
    required: false
    method: ftp
  mob_suite:
    location: &db_mob_suite {DB_ROOT}/mob_suite/latest
    required: false
    method: ftp
  mykrobe:
    location: &db_mykrobe {DB_ROOT}/mykrobe/latest
    required: false
    method: ftp
  ncbi_human_read_scrubber:
    location: &db_ncbi_human_read_scrubber {DB_ROOT}/ncbi_human_read_scrubber/human_filter.db
    is_file: true
    required: false
    method: ftp
  ref_fasta:
    location: &ref_fasta {DB_ROOT}/refgenomes/Salmonella_enterica/NC_003197.2.fasta
    is_file: true
    required: true
    method: ftp
  ref_gff3:
    location: &ref_gff3 {DB_ROOT}/refgenomes/Salmonella_enterica/NC_003197.2.gff3
    is_file: true
    required: true
    method: ftp
  resfinder4:
    location: &db_resfinder4 {DB_ROOT}/resfinder4
    required: false
    method: ftp
  sistr:
    location: &db_sistr {DB_ROOT}/SISTR/1.1.1/data
    required: false
    method: ftp
  seqsero:
    location: &db_seqsero2 {DB_ROOT}/pipelines/salmonella/seqsero2/1.2.1/seqsero2_db
    required: false
    method: ftp
  spifinder:
    location: &db_spifinder {DB_ROOT}/pipelines/salmonella/spifinder/genomicepidemiology-spifinder_db-db102668b704
    required: false
    method: ftp
  typing_cgmlst:
    location: &db_typing_cgmlst {DB_ROOT}/sequence_typing/salmonella/cgmlst
    is_file: false
    method: mist
  typing_mlst:
    location: &db_typing_mlst {DB_ROOT}/sequence_typing/salmonella/mlst
    is_file: false
    method: mist
  typing_rmlst:
    location: &db_typing_rmlst {DB_ROOT}/sequence_typing/various/rmlst
    required: false
    method: skip

####################
# Pipeline options #
####################
citations:
  main: null
  other:
    - Chen_2023-fastp
    - Shen_2024-seqkit2
    - Bankevich_2012-spades
    - Kolmogorov_2019-flye
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Low_2019-confindr
    - Manni_2021-busco
    - Langmead_2012-bowtie2
    - Li_2021-minimap2
    - Li_2009-samtools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Bortolaia_2020-resfinder_4.0
    - Roer_2016-spifinder
    - Wong_2016-genotyphi
    - Bradley_2015-mykrobe
    - Sherry_2023-abritamr
    - Yoshida_2016-sistr
    - Zhang_2019-seqsero2
    - Chen_2016-vfdb
    - Robertson_2018-mob_suite
    - Feldgarden_2019-ndaro
    - Zhou_2020-enterobase
    - Jolley_2010-bigsdb

####################
# Reference genome #
####################
reference:
  name: <i>Salmonella enterica subsp. enterica</i> serovar Typhimurium str. LT2 (NC_003197.2)
  fasta: *ref_fasta
  gff3: *ref_gff3
  url: https://www.ncbi.nlm.nih.gov/nuccore/NC_003197.2

#########################
# Tool specific options #
#########################
amrfinder:
  db: *db_amrfinder
  species: Salmonella

assembly:
  spades:
    cov_cutoff: 10
  min_contig_length: 1000

busco:
  db: *db_busco

confindr:
  db: *db_confindr

contamination_check:
  db: *db_kraken2
  expected_species: Salmonella enterica

downsampling:
  coverage_max: {COV_MAX}

mob_suite:
  db: *db_mob_suite

mykrobe:
  db: *db_mykrobe
  species: typhi
  show_amr: false
  title: Lineage determination of <i>S. Typhi</i>

quality_checks:
  typing_scheme: {QC_SCHEME}

read_scrubbing:
  db: *db_ncbi_human_read_scrubber

read_trimming: {{}}

resfinder4:
  db: *db_resfinder4
  species: Salmonella enterica

variant_calling:
  ploidy: 1
  report_include_bam: {EXPORT_BAM}

variant_filtering: {{}}

############################
# Gene detection databases #
############################
gene_detection:
  dbs:
    vfdb_core:
      path: *db_gd_vfdb_core
      perc_identity_cutoff: 90
      metadata:
        name: Gene
        key: gene
      hidden: true

###################
# Sequence typing #
###################
sequence_typing:
  dbs:
    mlst:
      path: *db_typing_mlst
    cgmlst:
      path: *db_typing_cgmlst
      blastn_task: blastn
    rmlst:
      path: *db_typing_rmlst
      message:
        content: rMLST is only available for noncommercial use, see <a href="https://pubmlst.org/species-id">PubMLST</a> for more info.
        category: info

##############
# Serotyping #
##############
serotyping:
  sistr:
    path: *db_sistr
  seqsero2:
    path: *db_seqsero2

#############
# SPIFinder #
#############
spifinder:
  path: *db_spifinder

#############
# abritAMR #
#############
abritamr:
  species: Salmonella
  amrfinderplus:
    path: *db_abritamr
