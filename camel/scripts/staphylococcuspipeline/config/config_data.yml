#########################
# Tool specific options #
#########################
read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken/latest/abfhpv_lite/
  expected_species: Staphylococcus aureus

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: 32.7

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 'off'
  min_contig_length: 0

pointfinder:
  db: staphylococcus_aureus

spa_typing:
  db: /db/pipelines/saureus/profiles.fasta
  profiles: /db/pipelines/saureus/spatypes.csv

sccmec_typing:
  profiles: /db/pipelines/saureus/SCCmec_genes/profiles.yml

############################
# Gene detection databases #
############################
gene_detection:
  argannot:
    path: /db/gene_detection/ARG-ANNOT
    perc_identity_cutoff: 90

  resfinder:
    path: /db/gene_detection/ResFinder
    perc_identity_cutoff: 90
    extra_column:
      name: Antibiotic(s)
      key: antibiotics

  card:
    path: /db/gene_detection/CARD
    perc_identity_cutoff: 90

  ncbi_amr:
    path: /db/gene_detection/NCBI_AMR/
    perc_identity_cutoff: 90

  vfdb_core:
    path: /db/gene_detection/VFDB_core
    perc_identity_cutoff: 90
    extra_column:
      name: Gene
      key: gene

  vf_exoenzyme:
    path: /db/gene_detection/VirulenceFinder-Saureus-exoenzyme
    extra_column:
      name: Protein function
      key: protein_function

  vf_hostimm:
    path: /db/gene_detection/VirulenceFinder-Saureus-hostimm
    extra_column:
      name: Protein function
      key: protein_function

  vf_toxin:
    path: /db/gene_detection/VirulenceFinder-Saureus-toxin
    extra_column:
      name: Protein function
      key: protein_function

  sccmec_genes:
    path: /db/gene_detection/SCCmec_genes

  sccmec_cassette:
    path: /db/gene_detection/SCCmec_cassette
    force_detection_method: srst2

###################
# Sequence typing #
###################
sequence_typing:
  mlst: /db/sequence_typing/staphylococcus/mlst
  cgmlst: /db/sequence_typing/staphylococcus/cgmlst
