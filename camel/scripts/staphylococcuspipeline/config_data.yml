    required: false
    method: ftp
  gene_detection_vfdb_core:
    location: &db_gd_vfdb_core {DB_ROOT}/gene_detection/VFDB_core
    required: false
    method: ftp
  gene_detection_vf_exoenzyme:
    location: &db_gd_vf_exoenzyme {DB_ROOT}/gene_detection/VirulenceFinder-Saureus-exoenzyme
    required: false
    method: ftp
  gene_detection_vf_hostimm:
    location: &db_gd_vf_hostimm {DB_ROOT}/gene_detection/VirulenceFinder-Saureus-hostimm
    required: false
    method: ftp
  gene_detection_vf_toxin:
    location: &db_gd_vf_toxin {DB_ROOT}/gene_detection/VirulenceFinder-Saureus-toxin
    required: false
    method: ftp
  kraken2:
    location: &db_kraken2 {DB_ROOT}/kraken2_microbial/latest
    required: false
    method: ftp
  mob_suite:
    location: &db_mobsuite {DB_ROOT}/mob_suite/latest
    required: false
    method: ftp
