####################
# Pipeline options #
####################
citations:
  main: Bogaerts_2021-stec_pipeline
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Low_2019-confindr
    - Manni_2021-busco
    - Langmead_2012-bowtie2
    - Li_2009-samtools
    - Li_2011-bcftools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Inouye_2014-srst2
    - Bortolaia_2020-resfinder_4.0
    - Feldgarden_2019-ndaro
    - Joensen_2014-virulencefinder
    - Joensen_2015-serotypefinder
    - Carattoli_2020-plasmidfinder
    - Jaureguy_2008-pasteur
    - Zhou_2020-enterobase
    - Jolley_2010-bigsdb

#########################
# Tool specific options #
#########################
downsampling:
  coverage_max: {coverage_max}
  expected_genome_size: 5_498_578

contamination_check:
  db: /db/kraken2_microbial/latest
  expected_species: Escherichia coli

assembly:
  spades:
    cov_cutoff: 10
  min_contig_length: 1000

variant_calling:
  ploidy: 1
  report_include_bam: {export_bam}
  reference:
    path: /db/refgenomes/Escherichia_coli/NC_002695.2.fasta
    name: <i>Escherichia coli</i> O157:H7 (NC_002695.2)
    url: https://www.ncbi.nlm.nih.gov/nuccore/NC_002695.2

variant_filtering: {{}}

quality_checks:
  expected_gc_content: 50.5
  typing_scheme: {qc_typing_scheme}

quast:
  ref:
    fasta: /db/refgenomes/Escherichia_coli/NC_002695.2.fasta
    gff3: /db/refgenomes/Escherichia_coli/NC_002695.2.gff

confindr:
  db: /db/confindr/0.8.1

amrfinder:
  db: /db/amrfinder/by_version/latest
  species: Escherichia

resfinder4:
  db: /db/resfinder4
  species: Escherichia coli

mob_suite:
  db: /db/mob_suite/latest

############################
# Gene detection databases #
############################
gene_detection:
  plasmidfinder:
    path: /db/gene_detection/PlasmidFinder-entero
    params:
      blastn:
        min_percent_identity: 95
        min_coverage: 60
      srst2:
        max_divergence: 5
        min_coverage: 60
    message:
      content: The presence of a replicon does not mean that the corresponding plasmid is present.
      category: warning
  ncbi_stress:
    path: /db/gene_detection/NCBI_STRESS
  serotype_o:
    path: /db/gene_detection/SerotypeFinder-O_type
    params:
      blastn:
        min_percent_identity: 85
        min_coverage: 60
      srst2:
        max_divergence: 15
        min_coverage: 60
    metadata:
      name: Predicted serotype
      key: predicted_serotype
  serotype_h:
    path: /db/gene_detection/SerotypeFinder-H_type
    params:
      blastn:
        min_percent_identity: 85
        min_coverage: 60
      srst2:
        max_divergence: 15
        min_coverage: 60
    metadata:
      name: Predicted serotype
      key: predicted_serotype
  virulencefinder:
    path: /db/gene_detection/VirulenceFinder-Ecoli
    metadata:
      name: Protein function
      key: protein_function
    hidden: true
  virulencefinder_shiga:
    path: /db/gene_detection/VirulenceFinder-Shiga
    metadata:
      name: stx variant
      key: stx_variant

###################
# Sequence typing #
###################
sequence_typing:
  cgmlst:
    path: /db/sequence_typing/ecoli/cgmlst
    blastn_task: blastn
  innuendo_cgmlst:
    path: /db/sequence_typing/ecoli/innuendo_cgmlst
  mlst_pasteur:
    path: /db/sequence_typing/ecoli/mlst_pasteur
  mlst_warwick:
    path: /db/sequence_typing/ecoli/mlst_warwick
  rmlst:
    path: /db/sequence_typing/various/rmlst
    message:
      content: rMLST is only available for noncommercial use, see <a href="https://pubmlst.org/species-id">PubMLST</a> for more info.
      category: info
