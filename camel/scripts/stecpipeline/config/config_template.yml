###################
# General options #
###################
pipeline:
  name: STEC pipeline
  version: '{version}'

# Logging variables
logging: {logging}

# Input files
sample_name: {sample_name}
{fastq_key}: {fastq_input}

# Output files
output_report: {output_report}
output_tabular: {output_tabular}
output_dir: {output_dir}

# Working directory
working_dir: {working_dir}

# Analysis options
detection_method: {detection_method}
read_type: {read_type}

#####################
# Optional analyses #
#####################
analyses: {analyses}

#########################
# Tool specific options #
#########################
read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /data/kraken/latest/abfhpv_lite
  expected_species: Escherichia coli

expected_gc_content: 50.5

variant_calling:
  ploidy: 1
  reference:
    path: /data/refgenomes/ecoli/NC_002695.2.fasta
    name: <i>Escherichia coli</i> O157:H7 (NC_002695.2)
    url: https://www.ncbi.nlm.nih.gov/nuccore/NC_002695.2

variant_filtering:
  {variant_filtering}

quality_checks:
  typing_scheme: {qc_typing_scheme}

############################
# Gene detection databases #
############################
gene_detection:
  argannot:
    path: /data/sequence_db_new/ARG-ANNOT
    perc_identity_cutoff: 90

  resfinder:
    path: /data/sequence_db_new/ResFinder
    perc_identity_cutoff: 90
    extra_column: ['Antibiotic(s)', 'antibiotics']

  card:
    path: /data/sequence_db_new/CARD
    perc_identity_cutoff: 90

  ncbi_amr:
    path: /data/sequence_db_new/NCBI_AMR
    perc_identity_cutoff: 90

  virulencefinder:
    path: /data/sequence_db_new/VirulenceFinder-Ecoli
    perc_identity_cutoff: 90
    extra_column: ['Protein function', 'protein_function']

  virulencefinder_shiga:
    path: /data/sequence_db_new/VirulenceFinder-Shiga
    perc_identity_cutoff: 90
    extra_column: ['stx variant', 'stx_variant']

  plasmidfinder:
    path: /data/sequence_db_new/PlasmidFinder-entero
    perc_identity_cutoff: 95
    extra_column: ['Notes', 'notes']

  serotype_o:
    path: /data/sequence_db_new/SerotypeFinder-O_type
    perc_identity_cutoff: 90
    extra_column: ['Predicted serotype', 'predicted_serotype']

  serotype_h:
    path: /data/sequence_db_new/SerotypeFinder-H_type
    perc_identity_cutoff: 90
    extra_column: ['Predicted serotype', 'predicted_serotype']

###################
# Sequence typing #
###################
sequence_typing:
  mlst_pasteur: /db/sequence_typing/ecoli/mlst-pasteur
  mlst_warwick: /db/sequence_typing/ecoli/mlst-warwick
#  cgmlst: /db/sequence_typing/ecoli/cgmlst
#  wgmlst: /db/sequence_typing/ecoli/wgmlst
