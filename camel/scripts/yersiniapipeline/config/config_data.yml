#########################

downsampling:
  coverage_max: {coverage_max}
  expected_genome_size: {genome_size}

read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2_microbial/latest
  expected_species: {expected_species}

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: {gc_content}

quast:
  ref:
    fasta: {quast_fasta}
    gff3: {quast_gff}

