####################
# Pipeline options #
####################

citations:
  main: null
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Low_2019-confindr
    - Manni_2021-busco
    - Langmead_2012-bowtie2
    - Danecek_2021-samtools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Inouye_2014-srst2
    - Bortolaia_2020-resfinder_4.0
    - Feldgarden_2019-ndaro
    - Jolley_2010-bigsdb
    - Chen_2016-vfdb
    - Savin_2019-yersinia_cgmlst


#########################
# Tool specific options #
#########################

downsampling:
  coverage_max: {coverage_max}
  expected_genome_size: 4_548_822

read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2_microbial/latest
  expected_species: 'Yersinia'
  level_of_depth: G

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: 47

quast:
  ref:
    fasta: '/db/refgenomes/Yersinia_enterocolitica/NC_GCA_02575835.1.fasta'
    gff3: '/db/refgenomes/Yersinia_enterocolitica/NC_GCA_02575835.1.gff3'

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 'off'
  min_contig_length: 1000

amrfinder:
  db: /db/amrfinder/by_version/latest

mob_suite:
  db: /db/mob_suite/latest

confindr:
  db: /db/confindr/0.8.1

resfinder4:
  point: False
  db: /db/resfinder4


species_determination:
  tsv: /db/pipelines/yersinia/cgMLST_taxonomic.tsv

############################
# Gene detection databases #
############################
gene_detection:
  vfdb_core:
    path: /db/gene_detection/VFDB_core
    perc_identity_cutoff: 90
    metadata:
      name: Gene
      key: gene

###################
# Sequence typing #
###################

sequence_typing:
  cgmlst:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_spp'
    detection_method: blast
    write_all_matches: True
  mlst:
    path: '/db/sequence_typing/yersinia/mlst_achtman'
  mlst_mcnally:
    path: '/db/sequence_typing/yersinia/mlst_mcnally'
  cgmlst_ye:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_enterocolitica'
    detection_method: blast
  cgmlst_yp:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_pseudotuberculosis'
  cgmlst_enterobase:
    path: '/db/sequence_typing/yersinia/cgmlst_enterobase'
  rmlst:
    path: '/db/sequence_typing/various/rmlst'
    message:
      content: rMLST is only available for noncommercial use, see <a href="https://pubmlst.org/species-id">PubMLST</a> for more info.
      category: info