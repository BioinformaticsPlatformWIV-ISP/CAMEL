####################
# Pipeline options #
####################

citations:
  main: null
  other:
    - Bolger_2014-trimmomatic
    - Bankevich_2012-spades
    - Gurevich_2013-quast
    - Wood_2019-kraken2
    - Low_2019-confindr
    - Manni_2021-busco
    - Langmead_2012-bowtie2
    - Danecek_2021-samtools
    - Camacho_2009-blast
    - Clausen_2018-kma
    - Inouye_2014-srst2
    - Zankari_2012-resfinder
    - Feldgarden_2019-ndaro
    - Jolley_2010-bigsdb

#########################
# Tool specific options #
#########################

downsampling:
  coverage_max: {coverage_max}
  expected_genome_size: {genome_size}

read_trimming:
  export_fastq: '{export_fastq}'

contamination_check:
  db: /db/kraken2_microbial/latest
  expected_species: {expected_species}

quality_checks:
  typing_scheme: {qc_typing_scheme}
  expected_gc_content: {gc_content}

quast:
  ref:
    fasta: {quast_fasta}
    gff3: {quast_gff}

srst2:
  max_unaligned_overlap: 141

assembly:
  spades:
    cov_cutoff: 'off'
  min_contig_length: 0

amrfinder:
  db: /db/amrfinder/by_version/latest

mob_suite:
  db: /db/mob_suite/latest

confindr:
  db: /db/confindr/0.8.1

#TODO: why does it throw an error without these configs, but other pipelines don't have these?
resfinder:
  min_cov: 0.9
  threshold: 0.6
  acq_overlap: 0


############################
# Gene detection databases #
############################
gene_detection:
  resfinder:
    path: /db/gene_detection/ResFinder
    metadata:
      name: Antibiotic(s)
      key: antibiotics

  vfdb_core:
    path: /db/gene_detection/VFDB_core
    perc_identity_cutoff: 90
    metadata:
      name: Gene
      key: gene

###################
# Sequence typing #
###################

sequence_typing:
  cgmlst:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_spp'
    detection_method: blast
  mlst:
    path: '/db/sequence_typing/yersinia/mlst_achtman'
  mlst_mcnally:
    path: '/db/sequence_typing/yersinia/mlst_mcnally'
  cgmlst_ye:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_enterocolitica'
  cgmlst_yp:
    path: '/db/sequence_typing/yersinia/cgmlst_yersinia_pseudotuberculosis'
  cgmlst_yersinia:
    path: '/db/sequence_typing/yersinia/cgmlst_enterobase'