      - ampc
  amrfinder:
    dbs:
      - amrfinder
  cgmlst_enterobase:
    dbs:
      - typing_cgmlst_enterobase
  cgmlst_ye:
    dbs:
      - typing_cgmlst_ye
  cgmlst_yp:
    dbs:
      - typing_cgmlst_yp
  cgmlst_yersinia_spp:
    dbs:
      - typing_cgmlst_yersinia_spp
  confindr:
    dbs:
      - confindr
  human_read_scrubbing:
    dbs:
      - ncbi_human_read_scrubber
  kraken2:
    dbs:
      - kraken2
  mlst_achtman:
    dbs:
      - typing_mlst_achtman
  mlst_mcnally:
    dbs:
      - typing_mlst_mcnally
  mob_suite:
    dbs:
      - mob_suite
