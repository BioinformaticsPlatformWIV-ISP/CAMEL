dependencies: mutect/1.1.7 openJDK/1.7.0
parameters:
  dbsnp_normal_lod: {default: false, mandatory: false, option: --dbsnp_normal_lod,
    value: '5.5'}
  downsampling_coverage_target: {default: false, mandatory: false, option: -dcov,
    value: '1000'}
  downsampling_type: {default: false, mandatory: false, option: -dt, value: BY_SAMPLE}
  fraction_contamination: {default: false, mandatory: false, option: --fraction_contamination,
    value: '0.02'}
  fraction_mapq_threshold: {default: false, mandatory: false, option: --fraction_mapq_threshold,
    value: '0.5'}
  gap_events_threshold: {default: false, mandatory: false, option: --gap_events_threshold,
    value: '3'}
  intervals: {default: false, mandatory: false, option: -L, value: null}
  max_alt_allele_in_normal_fraction: {default: false, mandatory: false, option: --max_alt_allele_in_normal_fraction,
    value: '0.03'}
  max_alt_alleles_in_normal_count: {default: false, mandatory: false, option: --max_alt_alleles_in_normal_count,
    value: '2'}
  max_alt_alleles_in_normal_qscore_sum: {default: false, mandatory: false, option: --max_alt_alleles_in_normal_qscore_sum,
    value: '20'}
  normal_lod_threshold: {default: false, mandatory: false, option: --normal_lod_threshold,
    value: '2.2'}
  output_callstats_file: {default: true, mandatory: true, option: -o, value: call_stats.txt}
  output_vcf_file: {default: true, mandatory: false, option: --vcf, value: variant_call.vcf}
  pir_mad_threshold: {default: false, mandatory: false, option: --pir_mad_threshold,
    value: '3'}
  pir_median_threshold: {default: true, mandatory: false, option: --pir_median_threshold,
    value: '0'}
  required_maximum_alt_allele_mapping_quality_score: {default: false, mandatory: false,
    option: --required_maximum_alt_allele_mapping_quality_score, value: '20'}
  strand_artifact_lod: {default: false, mandatory: false, option: --strand_artifact_lod,
    value: '2.0'}
  strand_artifact_power_threshold: {default: false, mandatory: false, option: --strand_artifact_power_threshold,
    value: '0.9'}
  tumor_lod: {default: false, mandatory: false, option: --tumor_lod, value: '6.3'}
tool_command: run_mutect.sh -T MuTect
