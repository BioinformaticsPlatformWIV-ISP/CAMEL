name: Assembly VelvetOptimiser
steps:
- id: Assembly
  tool: !!python/name:app.tools.velvetoptimiser.velvetoptimiser.VelvetOptimiser
  inputs:
  - name: FASTQ_PE
    from: initial
  - name: FASTQ_SE
    from: initial
  - name: FASTQ_SE_2
    from: initial

- id: Report_generation
  tool: !!python/name:app.tools.pipelines.assembly.htmlreporterassembly.HtmlReporterAssembly
  inputs:
  - name: HTML
    from: initial
  - name: DIR_HTML
    from: initial
  - name: FASTA_Contig
    from: Assembly
  - name: SAMPLE_NAME
    from: initial
  informs:
  - from: Assembly
    alias: velvet_optimiser
