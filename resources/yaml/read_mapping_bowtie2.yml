name: Read mapping Bowtie2
steps:
- id: Reference_indexing
  tool: !!python/name:app.tools.bowtie2.bowtie2index.Bowtie2Index
  inputs:
  - name: FASTA
    from: initial
    alias: FASTA_REF

- id: Read_mapping
  tool: !!python/name:app.tools.bowtie2.bowtie2map.Bowtie2Map
  inputs:
  - name: FASTQ_PE
    from: initial
  - name: FASTQ_SE_FORWARD
    from: initial
    alias: FASTQ_SE
  - name: FASTQ_SE_REVERSE
    from: initial
    alias: FASTQ_SE
  - name: INDEX_GENOME_PREFIX
    from: Reference_indexing

- id: Sam_to_bam_conversion
  tool: !!python/name:app.tools.samtools.samtoolsview.SamtoolsView
  inputs:
  - name: SAM
    from: Read_mapping

- id: Alignment_sorting
  tool: !!python/name:app.tools.samtools.samtoolssort.SamtoolsSort
  inputs:
  - name: BAM
    from: Sam_to_bam_conversion

- id: BAM_indexing
  tool: !!python/name:app.tools.samtools.samtoolsindex.SamtoolsIndex
  inputs:
  - name: BAM
    from: Alignment_sorting
