name: Read Trimming
steps:

- id: FastQC_pre_trimming
  tool: !!python/name:app.tools.fastqc.fastqc.FastQC
  inputs:
  - name: FASTQ
    from: initial

- id: Read_trimming
  tool: !!python/name:app.tools.trimmomatic.trimmomatic.Trimmomatic
  inputs:
  - name: FASTQ
    from: initial
    alias: FASTQ_PE


- id: FastQC_post_trimming
  tool: !!python/name:app.tools.fastqc.fastqc.FastQC
  inputs:
  - name: FASTQ_PE
    from: Read_trimming
    alias: FASTQ
  next-step:
  - when:
      condition: $pipeline_configs.SKIP_REPORT == True
      step-id: exit
  - default:
      step-id: Report_generation

- id: Report_generation
  tool: !!python/name:app.tools.pipelines.read_trimming.htmlreporterreadtrimming.HtmlReporterReadTrimming
  inputs:
  - name: HTML
    from: initial
  - name: DIR_HTML
    from: initial
  - name: HTML
    from: FastQC_pre_trimming
    alias: HTML_Pre
  - name: HTML
    from: FastQC_post_trimming
    alias: HTML_Post
  - name: FASTQ_PE
    from: Read_trimming
  - name: FASTQ_SE_FORWARD
    from: Read_trimming
  - name: FASTQ_SE_REVERSE
    from: Read_trimming
  informs:
  - from: Read_trimming
    alias: trimming
