name: Samtools SNP calling
steps:
- id: FASTA_indexing
  tool: !!python/name:app.tools.samtools.samtoolsfastaindex.SamtoolsFastaIndex
  inputs:
  - name: FASTA
    from: initial

- id: Pileup
  tool: !!python/name:app.tools.samtools.samtoolsmpileup.SamtoolsMPileup
  inputs:
  - name: FASTA
    from: FASTA_indexing
  - name: BAM
    from: initial

- id: SNP_calling
  tool: !!python/name:app.tools.bcftools.bcftoolscall.BcftoolsCall
  inputs:
  - name: VCF_GZ
    from: Pileup

- id: VCF_indexing
  tool: !!python/name:app.tools.bcftools.bcftoolsindex.BcftoolsIndex
  inputs:
  - name: VCF_GZ
    from: SNP_calling

- id: Stats_collection
  tool: !!python/name:app.tools.bcftools.bcftoolsindexstats.BcftoolsIndexStats
  inputs:
  - name: VCF_GZ
    from: VCF_indexing

- id: Consensus_sequence_generation
  tool: !!python/name:app.tools.bcftools.bcftoolsconsensus.BcftoolsConsensus
  inputs:
  - name: FASTA
    from: initial
  - name: VCF_GZ
    from: VCF_indexing

- id: Unzip_VCF
  tool: !!python/name:app.tools.bcftools.bcftoolsview.BcftoolsView
  inputs:
  - name: VCF_GZ
    from: SNP_calling
