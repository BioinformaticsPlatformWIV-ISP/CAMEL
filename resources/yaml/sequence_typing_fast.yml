name: Sequence Typing (Fast)
steps:
- id: Locus_set_manager
  tool: !!python/name:app.tools.pipelines.sequence_typing.locussetmanager.LocusSetManager
  inputs:
    - name: DIR
      from: initial
  next-step:
    - when:
        condition: $has_profile_definitions == True
        step-id: Blastn
    - default:
        step-id: Blastx

- id: Blastx
  tool: !!python/name:app.tools.blastloop.blastxloop.BlastxLoop
  inputs:
    - name: FASTA
      from: initial

    - name: DB_Prot
      from: Locus_set_manager
      alias: DB_BLAST
  next-step:
    - default:
        step-id: Blastx_TSV_generation

- id: Blastx_TSV_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
    - name: ASN
      from: Blastx

- id: Blastx_text_alignment_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
    - name: ASN
      from: Blastx
  next-step:
    - default:
        step-id: Blastn

- id: Blastn
  tool: !!python/name:app.tools.blastloop.blastnloop.BlastnLoop
  inputs:
    - name: FASTA
      from: initial
    - name: DB_Nucl
      from: Locus_set_manager
      alias: DB_BLAST

- id: Blastn_TSV_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
    - name: ASN
      from: Blastn
  next-step:
    - default:
        step-id: Blastn_text_alignment_generation

- id: Blastn_text_alignment_generation
  tool: !!python/name:app.tools.blastloop.blastformatterloop.BlastFormatterLoop
  inputs:
    - name: ASN
      from: Blastn
  next-step:
    - default:
        step-id: Best_hit_detection

- id: Best_hit_detection
  tool: !!python/name:app.tools.pipelines.sequence_typing.besthitextractor.BestHitExtractor
  inputs:
    - name: DB_Prot
      from: Locus_set_manager
      alias: FASTA_Prot

    - name: DB_Nucl
      from: Locus_set_manager
      alias: FASTA_Nucl

    - name: TSV
      from: Blastx_TSV_generation
      alias: TSV_Blastx

    - name: TSV
      from: Blastn_TSV_generation
      alias: TSV_Blastn
  informs:
    - from: Locus_set_manager
      alias: locus_set_info
  next-step:
    - default:
        step-id: Text_alignment_extraction

- id: Text_alignment_extraction
  tool: !!python/name:app.tools.pipelines.sequence_typing.alignmentextractor.AlignmentExtractor
  inputs:
  - name: TXT
    from: Blastn_text_alignment_generation

  - name: TXT
    from: Blastx_text_alignment_generation

  informs:
  - from: Best_hit_detection
    alias: hits

  next-step:
    - default:
        step-id: Allele_metadata_extraction

- id: Allele_metadata_extraction
  tool: !!python/name:app.tools.pipelines.sequence_typing.pubmlstmetadataextractor.PubmlstMetadataExtractor
  informs:
    - from: Best_hit_detection
      alias: hits
  next-step:
    - when:
        condition: $Locus_set_manager.has_profile_definitions
        step-id: Sequence_type_detection
    - default:
        step-id: exit

