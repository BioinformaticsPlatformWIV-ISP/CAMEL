dependencies: java/1.8.0 trimmomatic/0.36
parameters:
  average_quality: {default: false, mandatory: false, option: 'AVGQUAL:', value: '20'}
  baseout: {default: true, mandatory: true, option: -baseout, value: trimmomatic_output.fastq}
  head_crop: {default: false, mandatory: false, option: 'HEADCROP:', value: '1'}
  illuminaclip_PE: {default: true, mandatory: false, option: 'ILLUMINACLIP:', value: '$TRIMMOMATIC_ADAPTER_DIR/NexteraPE-PE.fa:2:30:10'}
  illuminaclip_SE: {default: true, mandatory: false, option: 'ILLUMINACLIP:', value: '$TRIMMOMATIC_ADAPTER_DIR/TruSeq3-SE.fa:2:30:10'}
  leading: {default: true, mandatory: false, option: 'LEADING:', value: '10'}
  minlen: {default: true, mandatory: false, option: 'MINLEN:', value: '40'}
  slidingwindow: {default: true, mandatory: false, option: 'SLIDINGWINDOW:', value: '4:20'}
  threads: {default: true, mandatory: false, option: -threads, value: '6'}
  trailing: {default: true, mandatory: false, option: 'TRAILING:', value: '10'}
tool_command: trimmomatic.sh
